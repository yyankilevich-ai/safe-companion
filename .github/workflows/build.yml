name: Build APK

# Builds an installable debug APK on every push and on demand.
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Use the runner's own Gradle (not the checked-in wrapper jar), so the
      # wrapper-validation step can't reject a hand-built wrapper.
      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
          validate-wrappers: false

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SafeCompanion-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
